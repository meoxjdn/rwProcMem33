name: Build Driver (MVP Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: "5.10"
            branch: "android12-5.10"
            ndk_ver: "r25c"
          - kernel: "6.1"
            branch: "android14-6.1"
            ndk_ver: "r26b"

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev gcc-aarch64-linux-gnu libdw-dev pahole llvm clang lld unzip wget

      - name: 安装 NDK
        run: |
          cd /opt
          sudo wget -q https://dl.google.com/android/repository/android-ndk-${{ matrix.ndk_ver }}-linux.zip
          sudo unzip -q android-ndk-${{ matrix.ndk_ver }}-linux.zip
          echo "NDK_HOME=/opt/android-ndk-${{ matrix.ndk_ver }}" >> $GITHUB_ENV

      - name: 自动定位源码并准备 Makefile
        run: |
          # 自动寻找包含 hwbp_proc.c 的目录
          SRC_DIR=$(find ${{ github.workspace }} -name "hwbp_proc.c" -exec dirname {} \;)
          if [ -z "$SRC_DIR" ]; then echo "❌ 找不到源码文件"; exit 1; fi
          echo "SRC_DIR=$SRC_DIR" >> $GITHUB_ENV
          
          # 覆盖 Makefile，确保多文件链接且 ko 名字唯一
          cat <<EOF > $SRC_DIR/Makefile
          obj-m += hwBreakpointProcMod.o
          hwBreakpointProcMod-y := hwBreakpointProc_module.o hwbp_proc.o
          # 强制关闭模块签名检查和 CFI 宏冲突
          EXTRA_CFLAGS += -DCONFIG_MODULE_GUIDE_ENTRY=1 -w
          EOF

      - name: 编译
        run: |
          git clone --depth 1 -b ${{ matrix.branch }} https://android.googlesource.com/kernel/common kernel-source
          K_DIR=$(pwd)/kernel-source
          CLANG_BIN=${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          export PATH=$CLANG_BIN:$PATH

          MAKE_ARGS="ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CLANG_BIN/aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- CC=$CLANG_BIN/clang LD=$CLANG_BIN/ld.lld"

          cd $K_DIR
          make $MAKE_ARGS gki_defconfig
          # 针对 5.x 彻底关掉 CFI 保护
          scripts/config --disable CONFIG_CFI_CLANG
          make $MAKE_ARGS modules_prepare

          # 进入自动定位的源码目录编译
          cd ${{ env.SRC_DIR }}
          make -C $K_DIR M=$(pwd) $MAKE_ARGS modules

          mkdir -p ${{ github.workspace }}/out
          cp hwBreakpointProcMod.ko ${{ github.workspace }}/out/driver-${{ matrix.kernel }}.ko

      - name: 上传结果
        uses: upload-artifact@v4
        with:
          name: driver-${{ matrix.kernel }}
          path: ${{ github.workspace }}/out/*.ko
